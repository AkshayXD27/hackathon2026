<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatsNow | Authentication</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <img src="assets/logo.png" alt="EatsNow Logo" class="logo-icon">
                <span class="logo-text">EatsNow</span>
            </div>
            
            <h2 id="form-title">Welcome Back</h2>
            <p id="form-subtitle">Log in to your account</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <p class="error-msg" id="error-msg"></p>
                <p class="success-msg" id="success-msg"></p>
                
                <button type="submit" class="submit-btn" id="submit-btn">Log In</button>
            </form>
            
            <div class="toggle-auth">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" id="toggle-link">Sign Up</a>
            </div>
        </div>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
