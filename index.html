<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EatsNow - Delicious Food, Delivered Fast. Order your favorite dishes from top restaurants in town.">
    <title>EatsNow | Delicious Food, Delivered Fast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav class="navbar" id="main-nav">
            <div class="logo">
                <img src="assets/logo.png" alt="EatsNow Logo" class="logo-icon">
                <span class="logo-text">EatsNow</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active" id="nav-home">Home</a></li>
                <li><a href="#" id="nav-menu">Menu</a></li>
                <li><a href="#" id="nav-about">About Us</a></li>
                <li><a href="#" id="nav-contact">Contact</a></li>
            </ul>
            <button class="login-btn" id="login-btn">Log In</button>
        </nav>

        <main class="hero">
            <div class="hero-content">
                <h1>Delicious <span class="highlight">Food,</span><br>Delivered <span class="highlight">Fast</span></h1>
                <p>Order your favorite dishes from top restaurants in town. We deliver deliciousness to your doorstep. Hungry for convenience? <strong>Let's get started!</strong></p>
                <button class="cta-btn" id="cta-explore">Explore Menu</button>
                
                <div class="feature-cards">
                    <div class="card card-priority" id="card-delivery">
                        <img src="assets/truck.png" alt="Priority Delivery Icon">
                        <span>Priority<br>Delivery</span>
                    </div>
                    <div class="card card-exclusive" id="card-exclusive">
                        <img src="assets/fork_knife.png" alt="Exclusive Menus Icon">
                        <span>Exclusive<br>Menus</span>
                    </div>
                    <div class="card card-birthday" id="card-birthday">
                        <img src="assets/cake.png" alt="Birthday Rewards Icon">
                        <span>Birthday<br>Rewards</span>
                    </div>
                </div>
            </div>
            
            <div class="hero-image">
                <img src="assets/hero_food.png" alt="Delicious 3D Food Illustration" id="main-hero-img">
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
